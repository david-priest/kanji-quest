<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f7fb" />
    <title>Kanji Quest — JLPT</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kanji Quest" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <header class="topbar">
      <button id="nav-home" class="brand" aria-label="Home">
        <span class="brand-mark">漢</span>
        <span class="brand-name">Kanji Quest</span>
      </button>
      <div class="stats" role="status" aria-live="polite">
        <span class="stat streak" title="Daily streak">
          <span class="stat-label">streak</span><span id="stat-streak">0</span>
        </span>
        <span class="stat xp" title="Total XP">
          <span class="stat-label">XP</span><span id="stat-xp">0</span>
        </span>
        <button id="nav-settings" class="icon-btn" aria-label="Settings">⚙︎</button>
      </div>
    </header>

    <main id="view" class="view"></main>

    <!-- Floating layers -->
    <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>
    <div id="toast-layer" class="toast-layer" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
