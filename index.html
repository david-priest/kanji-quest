<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" />
    <title>Kanji Quest — JLPT</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='86' font-size='90'>漢</text></svg>" />
  </head>
  <body>
    <header class="topbar">
      <button id="nav-home" class="brand" aria-label="Home">
        <span class="brand-mark">漢</span>
        <span class="brand-name">Kanji Quest</span>
      </button>
      <div class="stats" role="status" aria-live="polite">
        <span class="stat streak" title="Daily streak">
          <span class="stat-icon">🔥</span><span id="stat-streak">0</span>
        </span>
        <span class="stat xp" title="Total XP">
          <span class="stat-icon">⭐</span><span id="stat-xp">0</span>
        </span>
        <button id="nav-settings" class="icon-btn" aria-label="Settings">⚙︎</button>
      </div>
    </header>

    <main id="view" class="view"></main>

    <!-- Floating layers -->
    <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>
    <div id="toast-layer" class="toast-layer" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
